# /etc/ssh/sshd_config.d/clive.conf
# Hardened SSH configuration for clive-as-a-service
#
# Requires: a dedicated "clive" system user
# Install: sudo cp sandbox/sshd_clive.conf /etc/ssh/sshd_config.d/clive.conf
#          sudo systemctl reload sshd

Match User clive
    # Force all commands through the sandbox wrapper
    ForceCommand /opt/clive/server/ssh_entrypoint.sh

    # Disable all forwarding — no tunnels, no X11, no agent
    AllowTcpForwarding no
    X11Forwarding no
    PermitTunnel no
    AllowAgentForwarding no
    GatewayPorts no

    # Forward API keys and configuration from client
    AcceptEnv ANTHROPIC_API_KEY OPENAI_API_KEY OPENROUTER_API_KEY LLM_PROVIDER AGENT_MODEL CLIVE_TOOLSET

    # Resource limits per user
    MaxSessions 3
    MaxAuthTries 3
    ClientAliveInterval 60
    ClientAliveCountMax 3

    # Optional chroot (see docs/deployment/remote-setup.md for trade-offs)
    # ChrootDirectory /opt/clive/jail

    # Restrict to key-based auth only
    PasswordAuthentication no
    PermitEmptyPasswords no
    AuthenticationMethods publickey
